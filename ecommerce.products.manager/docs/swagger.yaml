definitions:
  docs.ErrorResponse:
    properties:
      error:
        example: Error message describing what went wrong
        type: string
    type: object
  docs.PaginatedProductResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/ecommerce_products_manager_internal_models.Product'
        type: array
      next_page:
        example: 1
        type: integer
      page:
        example: 0
        type: integer
      pages:
        example: 2
        type: integer
      previous_page:
        type: integer
      size:
        example: 50
        type: integer
      total:
        example: 100
        type: integer
    type: object
  ecommerce_products_manager_internal_models.CreateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  ecommerce_products_manager_internal_models.DeleteProductResponse:
    properties:
      success:
        type: boolean
    type: object
  ecommerce_products_manager_internal_models.Product:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  ecommerce_products_manager_internal_models.UpdateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  ecommerce_products_manager_internal_models.UpdateStockRequest:
    properties:
      stock:
        type: integer
    type: object
info:
  contact: {}
paths:
  /products:
    post:
      consumes:
      - application/json
      description: Create a new product
      parameters:
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/ecommerce_products_manager_internal_models.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ecommerce_products_manager_internal_models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Create a new product
      tags:
      - Products
  /products/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ecommerce_products_manager_internal_models.DeleteProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Delete a product
      tags:
      - Products
    get:
      consumes:
      - application/json
      description: Get a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ecommerce_products_manager_internal_models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get a product by ID
      tags:
      - Products
    put:
      consumes:
      - application/json
      description: Update a product by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/ecommerce_products_manager_internal_models.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ecommerce_products_manager_internal_models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Update a product
      tags:
      - Products
  /products/{id}/stock:
    put:
      consumes:
      - application/json
      description: Update the stock of a product
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Stock data
        in: body
        name: stock
        required: true
        schema:
          $ref: '#/definitions/ecommerce_products_manager_internal_models.UpdateStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ecommerce_products_manager_internal_models.Product'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Update product stock
      tags:
      - Products
  /products/search:
    get:
      consumes:
      - application/json
      description: Search products using multiple criteria including name, description,
        price, and stock filters with pagination
      parameters:
      - description: Filter by product name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by product description (partial match)
        in: query
        name: description
        type: string
      - description: Filter by exact price
        in: query
        name: price
        type: number
      - description: Filter by minimum stock quantity
        in: query
        name: stock
        type: integer
      - default: 0
        description: Page number (0-based)
        in: query
        name: page
        type: integer
      - default: 50
        description: Number of items per page
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/docs.PaginatedProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Search and list products with advanced filters
      tags:
      - Products
swagger: "2.0"
